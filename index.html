<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>テーマで学ぶ talk talk 韓国語</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+2:wght@300;400;500;600;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#fffaf8;
  --surface:#ffffff;
  --accent:#1a4a35;
  --accent2:#2d6e52;
  --accent-light:#e8f3ee;
  --text:#1a4a35;
  --text2:#4a7060;
  --border:#e0d8d0;
  --danger:#c0392b;
  --warning:#b7770d;
  --success:#1a6640;
  --sakura:#f9d0d8;
  --sakura2:#e8b8c4;
  --font-jp:'M PLUS 2',sans-serif;
  --font-kr:'Nanum Gothic',sans-serif;
}
html,body{height:100%;font-family:var(--font-jp);background:var(--bg);color:var(--text);}
body{display:flex;flex-direction:column;min-height:100vh;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;}

.sakura-bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.sakura-bg svg{width:100%;height:100%;}

.screen{display:none;flex:1;flex-direction:column;min-height:100vh;position:relative;z-index:1;}
.screen.active{display:flex;}

/* ── START ── */
#screen-start{align-items:center;justify-content:center;gap:20px;padding:24px 24px;min-height:100vh;}
.start-logo{text-align:center;}
.start-logo .hangul{font-family:var(--font-kr);font-size:72px;font-weight:800;color:var(--accent);line-height:1;letter-spacing:-3px;text-shadow:0 2px 20px rgba(26,74,53,.15);}
.start-logo .subtitle{font-family:var(--font-jp);font-size:14px;color:var(--text2);margin-top:6px;letter-spacing:.08em;}
.start-lesson{background:rgba(255,255,255,.88);border:1.5px solid var(--sakura2);border-radius:16px;padding:16px 20px;width:100%;max-width:360px;}
.start-lesson-title{font-size:13px;color:var(--text2);margin-bottom:10px;letter-spacing:.05em;font-weight:600;}
.lesson-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.lesson-btn{padding:11px 0;border:1.5px solid var(--sakura2);border-radius:10px;background:#fff;color:var(--accent);font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--font-jp);}
.lesson-btn:hover,.lesson-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.lesson-btn:disabled{opacity:.35;cursor:not-allowed;}
.mode-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px;}
.mode-btn{padding:18px 24px;border-radius:18px;border:none;cursor:pointer;font-size:17px;font-weight:700;display:flex;align-items:center;gap:16px;transition:all .25s;font-family:var(--font-jp);box-shadow:0 4px 20px rgba(26,74,53,.12);}
.mode-btn-teacher{background:rgba(255,255,255,.95);color:var(--accent);border:2px solid var(--sakura2);}
.mode-btn-student{background:var(--accent);color:#fff;}
.mode-btn:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(26,74,53,.2);}
.mode-icon{font-size:28px;flex-shrink:0;}
.mode-text-main{font-size:17px;font-weight:700;}
.mode-text-sub{font-size:11px;opacity:.7;font-weight:400;margin-top:2px;}

/* ── HEADER ── */
.app-header{background:rgba(255,255,255,.92);border-bottom:1px solid var(--sakura2);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.btn-back{background:var(--accent);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:16px;padding:11px 20px;font-weight:700;font-family:var(--font-jp);display:flex;align-items:center;gap:4px;transition:all .2s;flex-shrink:0;}
.btn-back:hover{background:var(--accent2);}
.header-title{flex:1;font-size:17px;font-weight:700;color:var(--text);font-family:var(--font-jp);}
.header-badge{background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;border:1px solid var(--accent);}

/* ── TAB BAR (둥근 버튼) ── */
.tab-bar{display:flex;gap:12px;background:rgba(255,255,255,.85);border-bottom:1px solid var(--sakura2);padding:14px 20px;}
.tab-btn{flex:1;padding:15px 0;border:2px solid var(--border);border-radius:16px;background:#fff;font-size:17px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .2s;font-family:var(--font-jp);}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(26,74,53,.2);}
.tab-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}

/* ── TEACHER DRILL ── */
.drill-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;gap:36px;}
.drill-card{background:rgba(255,255,255,.95);border-radius:28px;width:100%;max-width:380px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 36px rgba(26,74,53,.10);border:2px solid var(--sakura2);}
.drill-char{font-family:var(--font-kr);font-size:148px;font-weight:800;color:var(--accent);line-height:1;}
.drill-char.word{font-size:110px;}
.drill-char.word-lg{font-size:72px;}
.drill-hint{font-family:var(--font-jp);font-size:18px;color:var(--text2);margin-top:12px;font-weight:500;}
.btn-next-drill{background:var(--accent);color:#fff;border:none;border-radius:20px;padding:22px 64px;font-size:20px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--font-jp);box-shadow:0 6px 20px rgba(26,74,53,.25);}
.btn-next-drill:hover{background:#0f3322;transform:translateY(-2px);}
.drill-counter{font-size:15px;color:var(--text2);font-weight:600;}

/* ── STUDENT HOME ── */
#screen-student-home{align-items:center;justify-content:center;padding:0;}
.student-home-title{font-size:24px;font-weight:800;color:var(--accent);text-align:center;font-family:var(--font-jp);margin-bottom:4px;}
.step-cards{display:flex;flex-direction:column;gap:16px;width:100%;max-width:360px;padding:0 20px;}
.step-card{border-radius:18px;padding:18px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:16px;box-shadow:0 4px 16px rgba(26,74,53,.15);min-height:76px;}
.step-card.c1-card{background:#fff;border:2px solid var(--sakura2);}
.step-card.c2-card{background:var(--accent);border:2px solid var(--accent);}
.step-card.c3-card{background:#fff;border:2px solid var(--sakura2);}
.step-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,74,53,.22);}
.step-card-icon{font-size:26px;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-card-icon.c1{background:#e8f3ee;}
.step-card-icon.c2{background:rgba(255,255,255,.2);}
.step-card-icon.c3{background:#f0f4ff;}
.step-card-name{font-size:15px;font-weight:700;font-family:var(--font-jp);white-space:nowrap;}
.step-card-name.light{color:#fff;}
.step-card-name.dark{color:var(--accent);}
.step-card-desc{font-size:12px;margin-top:3px;font-family:var(--font-jp);white-space:nowrap;}
.step-card-desc.light{color:rgba(255,255,255,.75);}
.step-card-desc.dark{color:var(--text2);}

/* ── STEP CONTENT ── */
.step-content{flex:1;padding:24px 20px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;}

/* ── STEP 1 ── */
.card-big{background:rgba(255,255,255,.95);border-radius:22px;padding:36px 24px;display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 4px 18px rgba(26,74,53,.08);border:1.5px solid var(--sakura2);}
.char-display{font-family:var(--font-kr);font-size:100px;font-weight:800;color:var(--accent);line-height:1;}
.char-display.word-size{font-size:100px;}
.char-display.word-size-lg{font-size:64px;}
.jp-label{font-family:var(--font-jp);font-size:18px;color:var(--text2);font-weight:500;}
.btn-speak{background:var(--accent-light);color:var(--accent);border:2px solid var(--accent);border-radius:50px;padding:15px 36px;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;font-family:var(--font-jp);min-width:160px;justify-content:center;}
.btn-speak:hover{background:var(--accent);color:#fff;}
.btn-speak.speaking{background:var(--accent);color:#fff;animation:pulse .6s infinite alternate;}
@keyframes pulse{from{opacity:1;}to{opacity:.65;}}
.progress-bar-wrap{width:100%;background:var(--border);border-radius:99px;height:7px;overflow:hidden;}
.progress-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .3s;}
.nav-row{display:flex;gap:12px;width:100%;}
.btn-nav{flex:1;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--font-jp);}
.btn-prev{background:var(--accent-light);color:var(--accent);border:2px solid var(--accent);}
.btn-next-s{background:var(--accent);color:#fff;}
.btn-nav:hover{opacity:.85;transform:translateY(-1px);}
.item-count{text-align:center;font-size:14px;color:var(--text2);font-weight:600;}

/* ── STEP 2: 듣고 고르기 ── */
.quiz-header{display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
.quiz-score{font-size:14px;color:var(--text2);font-weight:600;}
.quiz-score span{font-weight:800;color:var(--accent);}
.timer-bar-wrap{width:100%;background:var(--border);border-radius:99px;height:9px;overflow:hidden;}
.timer-bar{height:100%;background:var(--accent2);border-radius:99px;transition:width .1s linear;}
.timer-bar.danger{background:var(--danger);}
.quiz-card{background:rgba(255,255,255,.95);border-radius:22px;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 4px 18px rgba(26,74,53,.08);border:1.5px solid var(--sakura2);}
.quiz-instruction{font-family:var(--font-jp);font-size:17px;color:var(--text2);text-align:center;font-weight:500;line-height:1.6;}
.btn-quiz-speak{background:var(--accent);color:#fff;border:none;border-radius:50px;padding:18px 44px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;font-family:var(--font-jp);box-shadow:0 4px 14px rgba(26,74,53,.25);}
.btn-quiz-speak:hover{background:#0f3322;}
/* 가로 배치 정사각형 버튼 */
.choices{display:flex;flex-direction:row;gap:12px;width:100%;justify-content:center;}
.choice-btn{flex:1;aspect-ratio:1;max-width:96px;background:#fff;border:2.5px solid var(--border);border-radius:16px;font-family:var(--font-kr);font-size:28px;font-weight:800;color:var(--accent);cursor:pointer;transition:all .2s;text-align:center;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(26,74,53,.06);}
.choice-btn:hover{border-color:var(--accent);background:var(--accent-light);}
.choice-btn.correct{background:#d4f4e0;border-color:var(--success);color:var(--success);}
.choice-btn.wrong{background:#fde8e8;border-color:var(--danger);color:var(--danger);}
.choice-btn.disabled{pointer-events:none;}
.quiz-result{background:rgba(255,255,255,.95);border-radius:22px;padding:44px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 4px 18px rgba(26,74,53,.08);border:1.5px solid var(--sakura2);text-align:center;}
.result-emoji{font-size:68px;}
.result-score{font-size:52px;font-weight:800;color:var(--accent);font-family:var(--font-kr);}
.result-label{font-size:17px;color:var(--text2);font-family:var(--font-jp);}
.result-detail{font-size:15px;color:var(--text2);font-family:var(--font-jp);}
.btn-retry{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px 44px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;font-family:var(--font-jp);}
.btn-retry:hover{background:#0f3322;}

/* ── STEP 3: 듣고 쓰기 ── */
.dictation-card{background:rgba(255,255,255,.95);border-radius:22px;padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 4px 18px rgba(26,74,53,.08);border:1.5px solid var(--sakura2);}
.q-number{background:var(--accent);color:#fff;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;font-family:var(--font-jp);}
.dictation-instruction{font-family:var(--font-jp);font-size:17px;color:var(--text2);text-align:center;line-height:1.75;font-weight:500;}
.answer-reveal{background:var(--accent-light);border:2.5px solid var(--accent);border-radius:18px;padding:22px 36px;text-align:center;display:none;}
.answer-reveal.show{display:block;}
.answer-reveal .answer-char{font-family:var(--font-kr);font-size:68px;font-weight:800;color:var(--accent);}
.answer-reveal .answer-jp{font-family:var(--font-jp);font-size:15px;color:var(--text2);margin-top:6px;}
.btn-reveal{background:var(--warning);color:#fff;border:none;border-radius:14px;padding:16px 32px;font-size:16px;font-weight:700;cursor:pointer;width:100%;transition:all .2s;font-family:var(--font-jp);}
.btn-reveal:hover{opacity:.85;}
.btn-next-dict{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px 32px;font-size:16px;font-weight:700;cursor:pointer;width:100%;display:none;transition:all .2s;font-family:var(--font-jp);}
.btn-next-dict.show{display:block;}
.btn-next-dict:hover{opacity:.85;}
</style>
</head>

// 과 선택
document.querySelectorAll('.lesson-btn').forEach((btn,i)=>{
  btn.addEventListener('click',()=>{
    const n=i+1;
    if(!CURRICULUM[n]) return;
    currentLesson=n;

// 음절/단어 모두 mp3 (없으면 TTS 폴백)
function playMp3(text, type){
  const path=`audio/${currentLesson}_${type}_${text}.mp3`;
  const audio=new Audio(path);
  audio.onerror=()=>ttsSpeak(text);
  audio.play().catch(()=>ttsSpeak(text));
  return audio;
}
function ttsSpeak(text){
  if(!window.speechSynthesis) return null;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=0.85;
  window.speechSynthesis.speak(u);
  return u;
}
function speakKorean(text, isWord=false){
  return playMp3(text, isWord?'w':'s');
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function goStudentHome(){showScreen('screen-student-home');}

  // 음절이 없으면 단어 탭으로 시작
  teacherTab=data.syllables.length>0?'syllable':'word';

  document.getElementById('drill-char').textContent='？';
  document.getElementById('drill-hint').textContent='ボタンを押してスタート';
  document.getElementById('drill-counter').textContent='';
  const hasSyl=data.syllables.length>0;
  document.querySelectorAll('#screen-teacher .tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',hasSyl?i===0:i===1);
    b.style.display=(i===0&&!hasSyl)?'none':'';
  });
  showScreen('screen-teacher');
}
function goStep(n){if(n===1){initStep1();showScreen('screen-step1');}else if(n===2){initStep2();showScreen('screen-step2');}else if(n===3){initStep3();showScreen('screen-step3');}}

// TEACHER
let teacherTab='syllable',teacherUsed=[];
function setTeacherTab(tab,btn){teacherTab=tab;teacherUsed=[];document.querySelectorAll('#screen-teacher .tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('drill-char').textContent='？';document.getElementById('drill-hint').textContent='ボタンを押してスタート';document.getElementById('drill-counter').textContent='';}
function nextDrill(){const items=teacherTab==='syllable'?data.syllables:data.words.map(w=>w.kr);if(teacherUsed.length===items.length)teacherUsed=[];let idx;do{idx=Math.floor(Math.random()*items.length);}while(teacherUsed.includes(idx)&&teacherUsed.length<items.length);teacherUsed.push(idx);const char=items[idx];const el=document.getElementById('drill-char');el.textContent=char;el.className='drill-char'+(char.length>=3?' word-lg':char.length===2?' word':'');document.getElementById('drill-hint').textContent=teacherTab==='syllable'?'この音節を読んでみよう':'この単語を読んでみよう';document.getElementById('drill-counter').textContent=teacherUsed.length+' / '+items.length;}

// STEP 1
let s1Tab='syllable',s1Items=[],s1Idx=0,s1Shuffled=[];
function initStep1(){
  const hasSyl=data.syllables.length>0;
  s1Tab=hasSyl?'syllable':'word';
  document.querySelectorAll('#screen-step1 .tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',hasSyl?i===0:i===1);
    b.style.display=(i===0&&!hasSyl)?'none':'';
  });
  loadStep1();
}
function setStep1Tab(tab,btn){s1Tab=tab;document.querySelectorAll('#screen-step1 .tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadStep1();}
function loadStep1(){
  s1Items=s1Tab==='syllable'?data.syllables.map(s=>({kr:s,jp:''})):data.words;
  if(s1Items.length===0){s1Items=data.words;}
  s1Shuffled=shuffle([...s1Items]);s1Idx=0;renderStep1();
}
function renderStep1(){const item=s1Shuffled[s1Idx];const el=document.getElementById('s1-char');el.textContent=item.kr;el.className='char-display'+(item.kr.length>=3?' word-size-lg':item.kr.length===2?' word-size':'');document.getElementById('s1-jp').textContent=item.jp||'';document.getElementById('s1-count').textContent=(s1Idx+1)+' / '+s1Shuffled.length;document.getElementById('s1-progress').style.width=((s1Idx+1)/s1Shuffled.length*100)+'%';document.getElementById('s1-speak-btn').classList.remove('speaking');}
function speak1(){const btn=document.getElementById('s1-speak-btn');btn.classList.add('speaking');const isWord=s1Tab==='word';const u=speakKorean(s1Shuffled[s1Idx].kr,isWord);if(u&&u.onend!==undefined)u.onend=()=>btn.classList.remove('speaking');else setTimeout(()=>btn.classList.remove('speaking'),1200);}
function step1Prev(){if(s1Idx>0){s1Idx--;renderStep1();}}
function step1Next(){if(s1Idx<s1Shuffled.length-1){s1Idx++;}else{s1Idx=0;s1Shuffled=shuffle([...s1Items]);}renderStep1();}

// STEP 2: 듣고 고르기
let s2Tab='syllable',s2Questions=[],s2Idx=0,s2Correct=0,s2Timer=null,s2TimerVal=0;
const S2_TIME_SYL=3,S2_TIME_WRD=5,S2_TOTAL=5;
function initStep2(){
  const hasSyl=data.syllables.length>0;
  s2Tab=hasSyl?'syllable':'word';
  document.querySelectorAll('#screen-step2 .tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',hasSyl?i===0:i===1);
    b.style.display=(i===0&&!hasSyl)?'none':'';
  });
  loadStep2();
}
function setStep2Tab(tab,btn){s2Tab=tab;document.querySelectorAll('#screen-step2 .tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadStep2();}
function loadStep2(){const pool=s2Tab==='syllable'?data.syllables.map(s=>({kr:s,jp:''})):data.words;s2Questions=shuffle([...pool]).slice(0,Math.min(S2_TOTAL,pool.length));s2Idx=0;s2Correct=0;renderStep2();}
function getChoices(correct,pool){
  // 같은 글자수 항목만 오답 후보로 사용
  const sameLen=pool.filter(p=>p.kr!==correct.kr && p.kr.length===correct.kr.length);
  // 같은 글자수가 2개 미만이면 글자수 무관하게 선택
  const candidates=sameLen.length>=2?sameLen:pool.filter(p=>p.kr!==correct.kr);
  return shuffle([correct,...shuffle(candidates).slice(0,2)]);
}
function renderStep2(){
  clearInterval(s2Timer);
  const pool=s2Tab==='syllable'?data.syllables.map(s=>({kr:s,jp:''})):data.words;
  if(s2Idx>=s2Questions.length){renderStep2Result();return;}
  const q=s2Questions[s2Idx];const choices=getChoices(q,pool);
  const timeLimit=s2Tab==='syllable'?S2_TIME_SYL:S2_TIME_WRD;s2TimerVal=timeLimit;
  document.getElementById('s2-content').innerHTML=`
  <div class="quiz-header"><div class="quiz-score">正解 <span>${s2Correct}</span> / ${s2Idx}</div><div style="font-size:14px;color:var(--text2);font-weight:600;">問題 ${s2Idx+1} / ${s2Questions.length}</div></div>
  <div class="timer-bar-wrap"><div class="timer-bar" id="s2-timer-bar" style="width:100%"></div></div>
  <div class="quiz-card">
    <div class="quiz-instruction">音声を聞いて、正しい文字を選んでください</div>
    <button class="btn-quiz-speak" onclick="speakKorean('${q.kr}', s2Tab==='word')">🔊 もう一度聞く</button>
    <div class="choices">${choices.map((c,i)=>`<button class="choice-btn" id="c2-${i}" onclick="checkAnswer2('${c.kr}','${q.kr}',${choices.length})">${c.kr}</button>`).join('')}</div>
  </div>`;
  setTimeout(()=>speakKorean(q.kr, s2Tab==='word'),400);
  const bar=document.getElementById('s2-timer-bar');
  s2Timer=setInterval(()=>{s2TimerVal-=0.1;const pct=Math.max(0,(s2TimerVal/timeLimit)*100);bar.style.width=pct+'%';if(pct<30)bar.classList.add('danger');if(s2TimerVal<=0){clearInterval(s2Timer);timeUp2(q.kr,choices.length);}},100);
}
function checkAnswer2(chosen,correct,n){clearInterval(s2Timer);if(chosen===correct)s2Correct++;for(let i=0;i<n;i++){const btn=document.getElementById('c2-'+i);if(!btn)continue;btn.classList.add('disabled');if(btn.textContent===correct)btn.classList.add('correct');else if(btn.textContent===chosen&&chosen!==correct)btn.classList.add('wrong');}setTimeout(()=>{s2Idx++;renderStep2();},900);}
function timeUp2(correct,n){for(let i=0;i<n;i++){const btn=document.getElementById('c2-'+i);if(!btn)continue;btn.classList.add('disabled');if(btn.textContent===correct)btn.classList.add('correct');}setTimeout(()=>{s2Idx++;renderStep2();},900);}
function renderStep2Result(){const pct=Math.round((s2Correct/s2Questions.length)*100);const emoji=pct>=80?'🎉':pct>=60?'😊':'😅';document.getElementById('s2-content').innerHTML=`<div class="quiz-result"><div class="result-emoji">${emoji}</div><div class="result-score">${s2Correct} / ${s2Questions.length}</div><div class="result-label">正解率 ${pct}%</div><div class="result-detail">${pct>=80?'素晴らしい！':pct>=60?'よくできました！':'もう一度練習しましょう！'}</div><button class="btn-retry" onclick="loadStep2()">もう一度</button></div>`;}

// STEP 3: 듣고 쓰기
let s3Tab='syllable',s3Items=[],s3Shuffled=[],s3Idx=0;
function initStep3(){
  const hasSyl=data.syllables.length>0;
  s3Tab=hasSyl?'syllable':'word';
  document.querySelectorAll('#screen-step3 .tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',hasSyl?i===0:i===1);
    b.style.display=(i===0&&!hasSyl)?'none':'';
  });
  loadStep3();
}
function setStep3Tab(tab,btn){s3Tab=tab;document.querySelectorAll('#screen-step3 .tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadStep3();}
function loadStep3(){s3Items=s3Tab==='syllable'?data.syllables.map(s=>({kr:s,jp:''})):data.words;s3Shuffled=shuffle([...s3Items]);s3Idx=0;renderStep3();}
function renderStep3(){document.getElementById('s3-qnum').textContent='問題 '+(s3Idx+1)+' / '+s3Shuffled.length;document.getElementById('s3-answer-char').textContent=s3Shuffled[s3Idx].kr;document.getElementById('s3-answer-jp').textContent=s3Shuffled[s3Idx].jp||'';document.getElementById('s3-answer').classList.remove('show');document.getElementById('s3-reveal-btn').style.display='block';document.getElementById('s3-next-btn').classList.remove('show');document.getElementById('s3-speak-btn').classList.remove('speaking');}
function speak3(){const btn=document.getElementById('s3-speak-btn');btn.classList.add('speaking');const isWord=s3Tab==='word';const u=speakKorean(s3Shuffled[s3Idx].kr,isWord);if(u&&u.onend!==undefined)u.onend=()=>btn.classList.remove('speaking');else setTimeout(()=>btn.classList.remove('speaking'),1200);}
function revealAnswer(){document.getElementById('s3-answer').classList.add('show');document.getElementById('s3-reveal-btn').style.display='none';document.getElementById('s3-next-btn').classList.add('show');}
function step3Next(){s3Idx++;if(s3Idx>=s3Shuffled.length){s3Idx=0;s3Shuffled=shuffle([...s3Items]);}renderStep3();}
</script>
